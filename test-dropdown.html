<!DOCTYPE html>
<html>
<head>
    <title>Dropdown Test</title>
</head>
<body>
    <h1>Testing Dropdown APIs</h1>
    <div id="results"></div>
    
    <script>
        async function testAPIs() {
            const resultsDiv = document.getElementById('results');
            
            try {
                console.log('Testing Customer API...');
                const customerResponse = await fetch('https://jbdspower.in/LeafNetServer/api/customer');
                const customerData = await customerResponse.json();
                
                resultsDiv.innerHTML += `<h2>Customer API Response:</h2>`;
                resultsDiv.innerHTML += `<p>Status: ${customerResponse.status}</p>`;
                resultsDiv.innerHTML += `<p>Count: ${Array.isArray(customerData) ? customerData.length : 'Not an array'}</p>`;
                resultsDiv.innerHTML += `<pre>${JSON.stringify(customerData.slice(0, 2), null, 2)}</pre>`;
                
                console.log('Customer API data:', customerData);
                
            } catch (error) {
                resultsDiv.innerHTML += `<p>Customer API Error: ${error.message}</p>`;
                console.error('Customer API Error:', error);
            }
            
            try {
                console.log('Testing Leads API...');
                const leadsResponse = await fetch('https://jbdspower.in/LeafNetServer/api/getAllLead');
                const leadsData = await leadsResponse.json();
                
                resultsDiv.innerHTML += `<h2>Leads API Response:</h2>`;
                resultsDiv.innerHTML += `<p>Status: ${leadsResponse.status}</p>`;
                resultsDiv.innerHTML += `<p>Count: ${Array.isArray(leadsData) ? leadsData.length : 'Not an array'}</p>`;
                resultsDiv.innerHTML += `<pre>${JSON.stringify(leadsData.slice(0, 2), null, 2)}</pre>`;
                
                console.log('Leads API data:', leadsData);
                
            } catch (error) {
                resultsDiv.innerHTML += `<p>Leads API Error: ${error.message}</p>`;
                console.error('Leads API Error:', error);
            }
        }
        
        testAPIs();
    </script>
</body>
</html>
